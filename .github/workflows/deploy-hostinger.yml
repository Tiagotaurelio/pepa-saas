name: Deploy PEPA to Hostinger

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Copy project to Hostinger
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "."
          target: ${{ secrets.PEPA_DEPLOY_PATH }}
          overwrite: true
          rm: false

      - name: Deploy container on Hostinger
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -eu
            DEPLOY_PATH="${{ secrets.PEPA_DEPLOY_PATH }}"
            REACTIVE_PUBLIC_DOMAIN="${{ secrets.REACTIVE_PUBLIC_DOMAIN }}"
            PEPA_PUBLIC_DOMAIN="${{ secrets.PEPA_PUBLIC_DOMAIN }}"
            if [ -z "$REACTIVE_PUBLIC_DOMAIN" ]; then
              REACTIVE_PUBLIC_DOMAIN="reactive-hml.tavarestech.cloud"
            fi
            if [ -z "$PEPA_PUBLIC_DOMAIN" ]; then
              PEPA_PUBLIC_DOMAIN="pepa-hml.tavarestech.cloud"
            fi
            HML_DATA_PATH="$DEPLOY_PATH/data-hml"
            mkdir -p "$HML_DATA_PATH"
            cat > "$DEPLOY_PATH/.env.hml" <<'EOF'
            PEPA_DATA_DIR=/app/data
            PEPA_DATABASE_URL=${{ secrets.PEPA_DATABASE_URL }}
            PEPA_DATABASE_SSL=${{ secrets.PEPA_DATABASE_SSL }}
            PEPA_DATABASE_SCHEMA=${{ secrets.PEPA_DATABASE_SCHEMA }}
            PEPA_OBJECT_STORAGE_BUCKET=${{ secrets.PEPA_OBJECT_STORAGE_BUCKET }}
            PEPA_OBJECT_STORAGE_REGION=${{ secrets.PEPA_OBJECT_STORAGE_REGION }}
            PEPA_OBJECT_STORAGE_ENDPOINT=${{ secrets.PEPA_OBJECT_STORAGE_ENDPOINT }}
            PEPA_OBJECT_STORAGE_ACCESS_KEY_ID=${{ secrets.PEPA_OBJECT_STORAGE_ACCESS_KEY_ID }}
            PEPA_OBJECT_STORAGE_SECRET_ACCESS_KEY=${{ secrets.PEPA_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
            PEPA_OBJECT_STORAGE_PUBLIC_BASE_URL=${{ secrets.PEPA_OBJECT_STORAGE_PUBLIC_BASE_URL }}
            PEPA_OBJECT_STORAGE_FORCE_PATH_STYLE=${{ secrets.PEPA_OBJECT_STORAGE_FORCE_PATH_STYLE }}
            PEPA_OBJECT_STORAGE_PREFIX=${{ secrets.PEPA_OBJECT_STORAGE_PREFIX }}
            PEPA_OBJECT_STORAGE_MIRROR_LOCAL=${{ secrets.PEPA_OBJECT_STORAGE_MIRROR_LOCAL }}
            EOF
            cd "$DEPLOY_PATH"
            rm -f middleware.ts
            docker build -t pepa-saas:latest .
            docker rm -f pepa-saas-hml >/dev/null 2>&1 || true
            for attempt in $(seq 1 30); do
              if ! docker ps -a --format '{{.Names}}' | grep -qx 'pepa-saas-hml'; then
                break
              fi
              docker rm -f pepa-saas-hml >/dev/null 2>&1 || true
              sleep 2
            done
            if docker ps -a --format '{{.Names}}' | grep -qx 'pepa-saas-hml'; then
              echo "pepa-saas-hml still exists after removal attempt"
              exit 1
            fi
            docker run -d \
              --name pepa-saas-hml \
              --restart unless-stopped \
              --env-file "$DEPLOY_PATH/.env.hml" \
              --network easypanel \
              -v "$HML_DATA_PATH:/app/data" \
              -p 3101:3000 \
              pepa-saas:latest
            TRAEFIK_CONTAINER="$(docker ps --filter name=traefik --format '{{.Names}}' | head -n 1)"
            if [ -n "$TRAEFIK_CONTAINER" ]; then
              docker exec "$TRAEFIK_CONTAINER" sh -lc "cat > /data/config/tavarestech.yml <<'EOF'
            http:
              routers:
                reactive-http:
                  rule: Host(\"$REACTIVE_PUBLIC_DOMAIN\")
                  entryPoints:
                    - http
                  middlewares:
                    - redirect-to-https
                  service: reactive-service
                reactive-https:
                  rule: Host(\"$REACTIVE_PUBLIC_DOMAIN\")
                  entryPoints:
                    - https
                  tls:
                    certResolver: letsencrypt
                  service: reactive-service
                pepa-http:
                  rule: Host(\"$PEPA_PUBLIC_DOMAIN\")
                  entryPoints:
                    - http
                  middlewares:
                    - redirect-to-https
                  service: pepa-service
                pepa-https:
                  rule: Host(\"$PEPA_PUBLIC_DOMAIN\")
                  entryPoints:
                    - https
                  tls:
                    certResolver: letsencrypt
                  service: pepa-service
              middlewares:
                redirect-to-https:
                  redirectScheme:
                    scheme: https
              services:
                reactive-service:
                  loadBalancer:
                    servers:
                      - url: http://reactive-saas-hml:3000
                pepa-service:
                  loadBalancer:
                    servers:
                      - url: http://pepa-saas-hml:3000
            EOF"
            fi
