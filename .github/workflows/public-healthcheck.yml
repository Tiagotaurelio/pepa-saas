name: Public Healthcheck PEPA

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Check public health endpoint
        run: |
          curl -fsS https://pepa.tavarestech.cloud/api/health
      - name: Check public demo page
        run: |
          curl -fsS https://pepa.tavarestech.cloud/demo >/dev/null
      - name: Notify failure webhook
        if: failure()
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
        run: |
          [ -n "$ALERT_WEBHOOK_URL" ] || exit 0
          curl -fsS -X POST "$ALERT_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"app\":\"pepa-saas\",\"workflow\":\"public-healthcheck\",\"status\":\"failure\",\"url\":\"https://pepa.tavarestech.cloud/api/health\"}"
