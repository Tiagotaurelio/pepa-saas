name: Deploy PEPA to Production

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Deploy PEPA to Hostinger"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment: production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Copy project to production host
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "."
          target: ${{ secrets.PEPA_DEPLOY_PATH }}
          overwrite: true
          rm: false

      - name: Deploy production container
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -eu
            DEPLOY_PATH="${{ secrets.PEPA_DEPLOY_PATH }}"
            PUBLIC_DOMAIN="${{ secrets.PEPA_PUBLIC_DOMAIN }}"
            if [ -z "$PUBLIC_DOMAIN" ]; then
              PUBLIC_DOMAIN="pepa.tavarestech.cloud"
            fi
            mkdir -p "$DEPLOY_PATH/data"
            cat > "$DEPLOY_PATH/.env" <<'EOF'
            PEPA_DATA_DIR=/app/data
            PEPA_DATABASE_URL=${{ secrets.PEPA_DATABASE_URL }}
            PEPA_DATABASE_SSL=${{ secrets.PEPA_DATABASE_SSL }}
            PEPA_DATABASE_SCHEMA=${{ secrets.PEPA_DATABASE_SCHEMA }}
            PEPA_OBJECT_STORAGE_BUCKET=${{ secrets.PEPA_OBJECT_STORAGE_BUCKET }}
            PEPA_OBJECT_STORAGE_REGION=${{ secrets.PEPA_OBJECT_STORAGE_REGION }}
            PEPA_OBJECT_STORAGE_ENDPOINT=${{ secrets.PEPA_OBJECT_STORAGE_ENDPOINT }}
            PEPA_OBJECT_STORAGE_ACCESS_KEY_ID=${{ secrets.PEPA_OBJECT_STORAGE_ACCESS_KEY_ID }}
            PEPA_OBJECT_STORAGE_SECRET_ACCESS_KEY=${{ secrets.PEPA_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
            PEPA_OBJECT_STORAGE_PUBLIC_BASE_URL=${{ secrets.PEPA_OBJECT_STORAGE_PUBLIC_BASE_URL }}
            PEPA_OBJECT_STORAGE_FORCE_PATH_STYLE=${{ secrets.PEPA_OBJECT_STORAGE_FORCE_PATH_STYLE }}
            PEPA_OBJECT_STORAGE_PREFIX=${{ secrets.PEPA_OBJECT_STORAGE_PREFIX }}
            PEPA_OBJECT_STORAGE_MIRROR_LOCAL=${{ secrets.PEPA_OBJECT_STORAGE_MIRROR_LOCAL }}
            PEPA_N8N_TOKEN=${{ secrets.PEPA_N8N_TOKEN }}
            PEPA_N8N_WEBHOOK_URL=${{ secrets.PEPA_N8N_WEBHOOK_URL }}
            PEPA_N8N_TENANT_ID=${{ secrets.PEPA_N8N_TENANT_ID }}
            PEPA_PUBLIC_DOMAIN=${{ secrets.PEPA_PUBLIC_DOMAIN }}
            PEPA_SMTP_HOST=${{ secrets.PEPA_SMTP_HOST }}
            PEPA_SMTP_PORT=${{ secrets.PEPA_SMTP_PORT }}
            PEPA_SMTP_SECURE=${{ secrets.PEPA_SMTP_SECURE }}
            PEPA_SMTP_USER=${{ secrets.PEPA_SMTP_USER }}
            PEPA_SMTP_PASS=${{ secrets.PEPA_SMTP_PASS }}
            PEPA_SMTP_FROM=${{ secrets.PEPA_SMTP_FROM }}
            EOF
            cd "$DEPLOY_PATH"
            docker build --no-cache -t pepa-saas:latest .
            docker rm -f pepa-saas-prod || true
            for attempt in $(seq 1 15); do
              if ! docker ps -a --format '{{.Names}}' | grep -qx 'pepa-saas-prod'; then
                break
              fi
              sleep 1
            done
            if docker ps -a --format '{{.Names}}' | grep -qx 'pepa-saas-prod'; then
              echo "pepa-saas-prod still exists after removal attempt"
              exit 1
            fi
            docker run -d \
              --name pepa-saas-prod \
              --restart unless-stopped \
              --env-file "$DEPLOY_PATH/.env" \
              --network easypanel \
              -v "$DEPLOY_PATH/data:/app/data" \
              -p 3201:3000 \
              pepa-saas:latest
            TRAEFIK_CONTAINER="$(docker ps --filter name=traefik --format '{{.Names}}' | head -n 1)"
            if [ -n "$TRAEFIK_CONTAINER" ]; then
              docker exec "$TRAEFIK_CONTAINER" sh -lc "cat > /data/config/pepa-production.yml <<EOF
            http:
              routers:
                pepa-production-http:
                  rule: Host(\"$PUBLIC_DOMAIN\")
                  entryPoints:
                    - http
                  middlewares:
                    - redirect-to-https
                  service: pepa-production-service
                pepa-production-https:
                  rule: Host(\"$PUBLIC_DOMAIN\")
                  entryPoints:
                    - https
                  tls:
                    certResolver: letsencrypt
                  service: pepa-production-service
              middlewares:
                redirect-to-https:
                  redirectScheme:
                    scheme: https
              services:
                pepa-production-service:
                  loadBalancer:
                    servers:
                      - url: http://pepa-saas-prod:3000
            EOF"
            fi
