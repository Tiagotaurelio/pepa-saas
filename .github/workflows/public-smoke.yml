name: Public Smoke PEPA

on:
  workflow_dispatch:
  schedule:
    - cron: "10 10 * * *"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Run public smoke
        env:
          APP_URL: https://pepa.tavarestech.cloud
        run: |
          sh ./scripts/post-deploy-smoke.sh
      - name: Notify failure webhook
        if: failure() && secrets.ALERT_WEBHOOK_URL != ''
        run: |
          curl -fsS -X POST "${{ secrets.ALERT_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"app\":\"pepa-saas\",\"workflow\":\"public-smoke\",\"status\":\"failure\",\"url\":\"https://pepa.tavarestech.cloud\"}"
